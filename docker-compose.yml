services:
    postgres:
        image: postgres:16.4
        container_name: next_quiz_postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        ports:
            - '5434:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - quiznet
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
            interval: 10s
            timeout: 5s
            retries: 5

    adminer:
        image: adminer:4.8.1
        container_name: next_quiz_adminer
        restart: unless-stopped
        ports:
            - '8081:8080'
        environment:
            ADMINER_DEFAULT_SERVER: postgres
        networks:
            - quiznet
        depends_on:
            postgres:
                condition: service_healthy

volumes:
    postgres_data:

networks:
    quiznet:
        driver: bridge
